<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe6f0;
            font-family: Arial, sans-serif;
        }

        .box {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px #aaa;
        }

        button {
            margin: 10px;
            padding: 12px 25px;
            border: none;
            border-radius: 20px;
            background: #ff4d88;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #ff1a66;
        }

        #answer {
            margin-top: 20px;
            font-size: 20px;
            color: #ff3366;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Ты пойдёшь со мной на свидание? ❤️</h1>

    <button onclick="yes()">Да, конечно</button>
    <button onclick="yes()">Обязательно</button>

    <p id="answer"></p>
</div>


<script>
    function yes() {
        document.getElementById("answer").innerHTML =
        "Отлично ❤️ Жду тебя в среду в 18:00";
    }
</script>
</body>
</html>
